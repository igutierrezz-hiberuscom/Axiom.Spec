decisions:
  - id: D-GIT-001
    summary: >-
      Git services live as a MODULE inside `@axiom/workflow` (`src/git/`), NOT a
      new `@axiom/git` package.
    rationale: >-
      The script/action side-effect taxonomy + the pure action-dispatch runner
      live in `@axiom/workflow` (transition-effects.ts); the git services are the
      concrete handlers for the `role-branch`/`commit-sync` named actions, so
      co-locating them is the cleaner fit. It also avoids the new-package
      `npm install` symlink gotcha and any workflow<->git dependency cycle. Git
      needs only Node built-ins (child_process/fs/path), so no heavy dependency is
      pulled into the otherwise dependency-light workflow package.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: D-GIT-002
    summary: >-
      The `GitRunner` seam shells git via `spawnSync` (synchronous), injectable;
      a fake runner records commands for unit tests.
    rationale: >-
      Mirrors the repo's existing precedent (`@axiom/doctor` write-scope.ts
      `runGitDiff` + self-update.ts use spawnSync with an injectable runner).
      Synchronous keeps the new `sdd.git*` MCP handlers synchronous like every
      other `sdd.*`/`spec.*` handler (only `memory.*` is async), avoiding the
      async blast radius that INC-cross-repo-mcp-wiring D-CRMW-001 deliberately
      avoided.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: D-GIT-003
    summary: >-
      No-push-by-default is enforced in the service itself: `commitSync` stages +
      commits LOCALLY and only pushes when `push: true`; the confirm gate
      (`confirmed`/`--confirm`) is a SEPARATE, additional requirement. Preview
      (dryRun) mutates nothing and reports the exact git commands that WOULD run
      plus current porcelain status.
    rationale: >-
      Safety-sensitive feature. Two independent guards (explicit push opt-in AND
      confirmation) make an accidental remote push impossible on the default path.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: D-GIT-004
    summary: >-
      `axiom-role start` git side-effect is OPT-IN (`--create-branch`) and
      confirm-gated (`--confirm`); default behavior is unchanged (no git). The
      pure action runner is generic over its handler context so `@axiom/workflow`
      stays git-agnostic; the git-specific context (repoRoot/vars/gitRunner) lives
      in the git module.
    rationale: >-
      The existing 2526-test suite must stay green; the role `start` transition's
      default path must not gain a git side-effect. Gating behind a flag + confirm
      preserves every existing test and the doctor dogfooding/write-scope
      boundary (git actions are runtime features, not workspace mutations).
    decidedAtUtc: "2026-07-12T00:00:00Z"

