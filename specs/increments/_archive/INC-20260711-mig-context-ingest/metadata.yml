      (`writeGuardedFile` + `technicalContextIndexPath`), so MCP-queryability is
      free (`spec.technicalContextIndexRead` serves it with no new MCP surface).
    rationale: >-
      The plan mandates mirroring from-code's ingest->map->index shape and
      sharing all of its write plumbing.
    decidedAtUtc: "2026-07-13"
  - id: D-002
    summary: >-
      Context docs carry an `AXIOM:MIGRATED` provenance banner naming the
      source path, DISTINCT from from-code's `AXIOM:DRAFT` banner.
    rationale: >-
      A reviewer must tell a migrated existing document apart from a fresh
      mechanical draft.
    decidedAtUtc: "2026-07-13"

