      Should from-context ingest emit `status: draft` on the generated
      TechnicalContextIndex (mirroring from-code) and never populate
      `mandatory.*` mechanically?
    blocking: false
    status: resolved
    resolution: >-
      Yes. Index carries `status: draft`, `available`-only, `mandatory.always`
      / `mandatory.whenTags` left empty â€” curation is a human judgment (same
      Q-bootstrap-1/3 rationale as from-code). Confirmed in implementation.

decisions:
