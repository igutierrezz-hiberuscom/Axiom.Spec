openQuestions:
  - id: Q-005
    type: technical
    question: >-
      Should the adoption flow be a new `axiom workspace adopt` subcommand or
      additive flags on `axiom workspace setup`?
    blocking: false
    status: resolved
    resolution: >-
      Additive flags on `axiom workspace setup` (`--adopt-spec`, `--adopt-sdd`,
      `--ingest-context`, `--dry-run`, `--yes`). Rationale: setup already builds
      the full workspace spec (control + spec + roles) and already models an
      adopt-in-place repo via WorkspaceRepoSpec.create:false; the adoption flags
      only (a) designate which repo is the foreign one to adopt in place,
      (b) trigger subject-A/context migration, and (c) add the dry-run-first +
      confirmation gate. The normal (no-adoption-flag) setup path is byte-for-byte
      unchanged, keeping all existing setup tests green.

decisions:
  - id: D-001
    summary: >-
      Adoption is a pure orchestrator (`runWorkspaceAdopt`, workspace-adopt.ts)
      over the already-shipped primitives: runWorkspaceSetup (subject B, adopt
      mode) + runBootstrapFromLegacySdd (subject A) + runBootstrapFromContext
      (context). No new write primitive; runWorkspaceSetup's public signature is
      unchanged (additive).
    rationale: >-
      Phases 0-4 already enforce the four preserved guarantees at the primitive
      level; composing them keeps the guarantees for free and avoids duplicating
      write logic.
    decidedAtUtc: "2026-07-13"
  - id: D-002
    summary: >-
      Dry-run and the confirmation gate are enforced ABOVE the setup call: the
      preview (subject-B conformance prediction + subject-A scan + context
      ingest) is built entirely from READ-ONLY probes (scanLegacyRepo /
      ingestContextDocs / filesystem existence), so a dry-run OR an unconfirmed
      run performs ZERO writes — runWorkspaceSetup (which writes) is only invoked
      after an explicit confirmation.
    rationale: >-
      A true dry-run cannot call runWorkspaceSetup (which parametrizes on disk);
      building the preview from read-only scans is the only way to preview
      subject A for a fresh install whose project is not resolvable until setup
      has run.
    decidedAtUtc: "2026-07-13"
  - id: D-003
    summary: >-
      Subject-B conformance report covers the 6 concerns of the plan's table
      (AGENTS.md, axiom.yaml v2, topology.yaml, skills-index, .axiom/mcp.yml,
      architect declarations) with status present | added | must-reconcile-by-hand,
      computed by diffing a pre-setup snapshot against a post-setup snapshot. A
      hand-written .axiom/mcp.yml that would change is PRESERVED (restored) and
      flagged must-reconcile-by-hand (the plan's explicit reconcile example).
    rationale: >-
      The plan's subject-B approach is "run setup in adopt mode + emit a
      conformance report of what was already present, what was added, and what
      must be reconciled by hand".
    decidedAtUtc: "2026-07-13"

