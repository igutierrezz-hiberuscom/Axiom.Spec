openQuestions:
  - id: Q-001
    type: testing # functional | technical | compliance | ux | testing
    question: "Should the KNOWN GAPS catalogued here (operator rollback restore, cross-repo upgrade fan-out, member-install/adapter-add surface gaps) each become their own increment?"
    blocking: false
    status: open # open | resolved | deferred
    resolution: >-
      Left open for the owner. This increment CATALOGS the gaps (with priority)
      and adds e2e tests for the genuinely-uncovered P0/P1 CROSS-CUTTING gaps; it
      does not itself build the missing product features (rollback restore,
      upgrade fan-out, member-install code-intel/process-surfaces).

decisions:
  - id: D-001
    summary: "The catalog's coverage column reflects a full read-only survey of the existing suites (274 test files) done this session, not a guess."
    rationale: >-
      Five parallel read-only surveys were run over apps/cli/tests/** and
      packages/*/tests/** (adoption/migration, spec-scope+MCP+cross-repo,
      lifecycle+affinity+verify, north-star+adapters, versioning+isolation) so
      each corner case is marked COVERED (with the exact file::test) or NONE.
    decidedAtUtc: "2026-07-13T00:00:00Z"
  - id: D-002
    summary: "New e2e tests were added only for genuinely-uncovered P0/P1 CROSS-CUTTING gaps (no duplicates)."
    rationale: >-
      Candidate scenarios were verified against the survey before adding. Two
      strong candidates were DROPPED as already-covered: cross-repo role-start
      reads plan-approved from the spec repo (axiom-role-cross-repo AC1/AC2) and
      openspec+docs-adr mixed adoption in one repo (workspace-adopt.e2e). The
      added tests chain the REAL engine paths (runWorkspaceSetup / runWorkspaceAdopt
      / runBootstrapFromLegacySdd / runUpgrade / buildImplementationContext) that
      no single existing test exercises end-to-end.
    decidedAtUtc: "2026-07-13T00:00:00Z"

