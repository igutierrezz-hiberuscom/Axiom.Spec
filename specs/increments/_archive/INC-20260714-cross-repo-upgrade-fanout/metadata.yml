decisions:
  - id: D-001
    summary: "Fan-out is gated on multi-repo topology + control repo; single-repo is byte-identical; --repo-only forces single."
    rationale: >-
      Fan-out only triggers when loadTopology(rootPath).mode === 'multi-repo' and the command runs
      from the control (sdd) repo. Existing upgrade tests use single-repo topologies, so they never
      trigger fan-out and stay byte-identical (no regression). --repo-only is the explicit escape
      hatch to force today's single-repo behavior even inside a multi-repo project.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-002
    summary: "Per-repo state via executeUpgrade directly; no init.json fabrication in role/spec repos."
    rationale: >-
      The fan-out runs inside the control repo's runOrchestrated('upgrade-command') entry gate
      (which only requires the control repo's init.json). For each topology repo it calls
      executeUpgrade({rootPath: repoPath, ...}) from @axiom/versioning, which initializes the
      ManagedState (readOrInitManagedState) and creates a pre-upgrade checkpoint WITHOUT requiring
      init.json. So each repo gets its own ManagedState + checkpoint under its own .axiom-state,
      and there is no need to fabricate init.json in role/spec repos (chose 'per-repo checkpoint',
      the enunciado-permitted option).
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-003
    summary: "sync + doctor run once at the end (workspace level), not per repo."
    rationale: >-
      Migration + checkpoint are per-repo (executeUpgrade with runSync:false/runDoctor:false), but
      sync (adapter regeneration across the workspace) and doctor are workspace-level and run once
      from the control repo after all repos migrated, honoring --no-sync/--no-doctor. Avoids N
      redundant sync/doctor passes.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-004
    summary: "Per-repo failure reports + exits non-zero; already-migrated repos are revertible via `axiom rollback` (gap 1 synergy)."
    rationale: >-
      executeUpgrade already restores the FAILED repo's own checkpoint on failure. The fan-out
      collects a per-repo result and, if any repo failed, exits non-zero with the full per-repo
      report. Repos already migrated in the same run stay migrated; the operator can revert any of
      them individually with `axiom rollback <checkpointId>` (INC-20260714-op-rollback-restore).
    decidedAtUtc: "2026-07-14T00:00:00Z"

