decisions:
  - id: D-001
    summary: "New first-class command `axiom rollback`, not a new flag on `upgrade`."
    rationale: >-
      A dedicated recovery verb (`axiom rollback <id>`) is clearer than overloading
      `upgrade`, and keeps `--from-checkpoint` with its existing forward-migration
      semantics (reuse a checkpoint as the restore point while migrating forward).
      Avoids two divergent restore paths.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-002
    summary: "Rollback is NOT gated through the orchestrator `upgrade-command` gate."
    rationale: >-
      The upgrade gate requires init.json (hasInitJson). Rollback is a recovery action;
      gating it on init.json could block the very recovery an operator needs after a bad
      upgrade. runRollback only requires the project to resolve (withProjectContext). The
      restore itself is atomic (restoreCheckpoint writes tmp+rename) and reverts init.json /
      install-profile.json / managed-state.json together.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-003
    summary: "Unknown checkpoint id must error with zero mutation."
    rationale: >-
      restoreCheckpoint already checks manifest existence before any write, so an unknown id
      throws before mutating. runRollback surfaces that as a clear CLI error (exit 1) and the
      test asserts the managed-state.json is byte-unchanged. The stale error-message reference
      inside restoreCheckpoint ("axiom upgrade --dry-run (siguiente lote)") is corrected to
      point at `axiom rollback --list`.
    decidedAtUtc: "2026-07-14T00:00:00Z"

