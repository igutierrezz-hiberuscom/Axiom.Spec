openQuestions:
  - id: Q-001
    type: technical # functional | technical | compliance | ux | testing
    question: "How deep should per-adapter materialization go for each supported adapter?"
    blocking: false
    status: resolved # open | resolved | deferred
    resolution: >-
      Two tiers. claude-code and opencode get FULL native surfaces (agent + command
      files / SKILL+AGENT files, plus opencode skills-lock registration). cursor,
      github-copilot and copilot-vscode get a rendered, role-differentiated instruction
      file referencing the surfaces + MCP. Every repo also gets adapter-agnostic
      portable surfaces under `.axiom/{agents,commands,skills}/` (the paths every
      generated AGENTS.md already advertises), so even adapters without a dedicated
      native shape resolve the surfaces.

decisions:
  - id: D-001
    summary: "Placeholder rendering of AGENTS.md is opt-in via a render context; role differentiation comes from the resolved topology."
    rationale: >-
      renderAgentsMd (claude-code + opencode) copied the template preamble verbatim,
      leaving {role}/{description}/{product.id}/{paths.specRoot}/{paths.sddRoot}/
      {discovery.modeOrder} literal. NS-2 adds an optional AgentsMdRenderContext to the
      generators; when present (as generateWorkspaceAdapters now passes per repo) the
      preamble placeholders are substituted from the resolved topology/profile, so a
      spec repo's AGENTS.md differs from a code repo's. When absent (every pre-existing
      unit test), behavior is byte-identical, so no legacy generator test breaks. New
      generator scenarios assert the substitution; the workspace-adapters/setup tests
      assert NO raw placeholders and spec-vs-code differentiation.
  - id: D-002
    summary: "The 3 NS-1 process surfaces are materialized into each repo by role, from bundled TS content, filling {role}/{specRepo}/{repoPath}/{projectId}."
    rationale: >-
      A scaffolded/adopted repo does not contain the product catalog sources on disk,
      so the surface bodies are bundled as TS constants (same pattern as
      workspace-adapter-templates.ts / CANONICAL_SEED_SOURCES). Mapping: spec repo
      (role spec) -> axiom-spec-author + axiom-role-planner; each code repo (role code)
      -> axiom-role-implementer parameterized for that role; sdd/control repo (role sdd)
      -> axiom-sdd-orchestrator. Wired into runWorkspaceSetup (so adopt, which delegates
      to it, gets it too) AND runRepoAdd. Materialization is not gated on repo `created`
      (adopted repos get surfaces too) but skips a repo whose axiom.yaml belongs to
      another project.
  - id: D-003
    summary: "Materialized process skills are registered in the repo skills-index so skillIndexRead / implementationContextRead.repoSkills return them."
    rationale: >-
      implementationContextRead reads repoSkills from the target (code) repo's
      skills-index/<role>.yaml. NS-2 augments (or creates) that index to add the process
      skill as a mandatory entry (implementer for code, spec-author+role-planner for
      spec, orchestrator for sdd). This makes the implementer flow's local-skills real:
      repoSkills is no longer empty of process content, and opencode skills-lock
      `installed` is no longer [] (the process skills are reconcile-merged in).

