decisions:
  - id: D-001
    summary: "Guard is a strict NO-OP unless topology is multi-repo, the current repo resolves to a v2 axiom.yaml role/repoId, and role assignments exist."
    rationale: "Preserves single-repo/self-hosted/unresolvable behaviour and the Axiom dogfood (v1 axiom.yaml) — keeps the 2275-test suite green."
    decidedAtUtc: "2026-07-11T00:00:00Z"
  - id: D-002
    summary: "Materialize the topology.yaml (role->repo map) into EVERY repo (control + spec + role), anchored per-repo, so any repo can answer 'what's my role, which repo owns role X'."
    rationale: "loadTopology(currentRepo) must see the shared assignments from any repo; per-repo anchoring keeps refs correct for existing ref-resolving consumers."
    decidedAtUtc: "2026-07-11T00:00:00Z"

