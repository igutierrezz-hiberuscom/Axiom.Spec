decisions:
  - id: D-001
    summary: "Chose option (b) — honesty (validate reflects reality + declare/scaffold UX) over option (a) real per-provider installers."
    rationale: >-
      Real installers (uv tool install serena-agent, etc.) add network side-effects and
      hard-to-test surface, and border on the heavy integrations the Axiom.SDD bootstrap limits
      caution against ("do not introduce scripts that do not exist yet"). Option (b) directly
      closes the false-green (the minimum required) and makes validate reflect marker vs
      installed-working. Option (a) is recorded as a documented future consideration, not built now.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-002
    summary: "Close the false-green in presentation/state, not by turning every optional-absent tool into a hard error."
    rationale: >-
      Warnings intentionally do not flip validate's ok/exit for non-required/mvp tools (exit-code
      semantics reserved for required/mvp). Flipping mvp:false absent tools to hard errors would
      regress doctor PASS. Instead, validate is probe-backed and renders declared-but-not-
      installed-working tools with their honest state (marker/declared/absent) and counts them as
      NOT satisfied — never green/OK — regardless of mvp, while keeping exit-code semantics intact.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-003
    summary: "add/repair UX clarified as declare/scaffold (writes YAML / creates a marker), not install."
    rationale: >-
      toolchain add DECLARES (writes toolchain.yaml) and toolchain repair SCAFFOLDS an empty
      marker dir; neither installs a working tool. The command help/messages are clarified so an
      operator is not misled; only an installed-working probe counts as installed. Minimal additive
      aliasing if any, without breaking existing subcommands.
    decidedAtUtc: "2026-07-14T00:00:00Z"

