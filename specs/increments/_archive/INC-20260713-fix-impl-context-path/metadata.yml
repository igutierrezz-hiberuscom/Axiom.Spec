openQuestions:
  - id: Q-001
    type: technical # functional | technical | compliance | ux | testing
    question: "Should the composite handler derive the role from the registry repo entry or from the resolved spec repo's axiom.yaml?"
    blocking: false
    status: resolved # open | resolved | deferred
    resolution: >-
      From the resolved spec repo's axiom.yaml via resolveProject(specRepoRoot).role,
      NOT from the registry `repos.spec.role`. The registry role key is a denormalized
      copy of the map key (always literally 'spec' when selected via repos['spec']), so
      it cannot discriminate a dedicated spec repo from a self-hosted one. resolveProject
      reads the actual axiom.yaml role — the same discriminator FIX-A's context.ts uses.

decisions:
  - id: D-001
    summary: "Reuse FIX-A's resolveSpecRelPathForScope helper + resolveProject-based role derivation; no third copy of the rule."
    rationale: >-
      The composite handler (buildImplementationContext) re-resolves the spec repo itself
      and does its own artifact-store reads WITHOUT a specRelPath, so they fell back to the
      DEFAULT_SPEC_REL_PATH ('axiom.spec') and returned plan:null / relatedSpec:null /
      allowedWriteScope:[] for a dedicated spec repo. Deriving the rel-path from
      resolveProject(specRepoRoot).role and passing resolveSpecRelPathForScope(role) into
      every spec-scope read converges the composite with the direct MCP builders + CLI +
      migration onto the same tree, with byte-identical behavior for self-hosted / single-repo.
    decidedAtUtc: "2026-07-13T00:00:00Z"

