decisions:
  - id: DEP-001
    summary: >-
      The three panels are thin FRONT + thin server endpoints over ALREADY SHIPPED
      engines — no new engine is written. ADO suggestions reuse the
      createWorkItemTracker factory + IWorkItemTracker.listWorkItems (WIQL); the git
      panels reuse the @axiom/workflow git-services (roleBranch/commitSync/gitStatus),
      the same functions the confirm-gated sdd.gitRoleBranch / sdd.gitCommitSync MCP
      handlers wrap.
    rationale: >-
      The epic's remaining item was UI over shipped engines. Reusing the engines keeps
      the change surgical and preserves every safety property already tested (no-push
      default, path-escape guard, branch-name validation, NullTracker local-only).
    decidedAtUtc: "2026-07-13T00:00:00Z"
  - id: DEP-002
    summary: >-
      tracker.kind != 'ado' (NullTracker) yields a graceful, network-free
      "ADO no configurado" result (configured:false, reason, empty suggestions) — NOT
      an error. The suggestions panel is display-only (no confirm-gated link action) to
      keep the mutation surface bounded.
    rationale: >-
      Local-only is the DEFAULT tracker; the panel must never crash or hit the network
      when ADO is not configured. Link-to-work-item is out of scope for this closing
      slice (bounded).
    decidedAtUtc: "2026-07-13T00:00:00Z"
  - id: DEP-003
    summary: >-
      The git panels follow the SAME preview/execute/confirmed contract as the rest of
      `axiom app`: POST without confirmed → preview (planned git commands + porcelain
      status, dryRun, NO mutation); POST with confirmed:true → apply in the pinned repo.
      commit-sync pushes ONLY when an explicit push toggle is set AND confirmed
      (two independent guards); default is NO push. A confirmed git apply broadcasts a
      `registryChanged` push over the existing SSE hub.
    rationale: >-
      Mirrors the shipped 0025 preview/execute/confirmed gate and the git-services'
      no-push-by-default (D-GIT-003). No new safety model.
    decidedAtUtc: "2026-07-13T00:00:00Z"
  - id: DEP-004
    summary: >-
      No new engine; the two DISCARDED sdd-launcher items (copilot-usage cost dashboard,
      deployment/trace panels) stay OUT of Axiom scope (owner 2026-07-11) — not revived,
      not deferred.
    rationale: >-
      Scope discipline: this increment closes the epic's remaining pointer only.
    decidedAtUtc: "2026-07-13T00:00:00Z"

