decisions:
  - id: D-001
    summary: "Reuse materializeProcessSurfaces (NS-2) + writeWorkspaceNativeMcpConfigs codeIntelProviders/kind (NS-3); mirror runRepoAdd."
    rationale: >-
      runRepoAdd (workspace-incremental.ts ~L668-754) already emits both per-role process surfaces
      and code-intel MCP entries. member install and adapter add replicate that exact pattern
      rather than introducing new architecture. The code-intel enablement signal is identical to
      the rest of the engine: workspaceJson.providers filtered by isCodeIntelProviderId. Default
      empty => nothing emitted => byte-identical to today (no regression).
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-002
    summary: "Per-repo role/kind derived from topology (sddRepo=control, specRepo=spec, roleCodeRepositories=role)."
    rationale: >-
      adapter add and member install operate on already-existing repos, so per-repo repoRole/kind
      is derived from the topology manifest (sddRepo->control, specRepo->spec, each
      roleCodeRepositories entry->role via assignments.roleId). Only kind==='role' (code) repos
      receive code-intel entries, which writeWorkspaceNativeMcpConfigs already gates on.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-003
    summary: "member install materializes surfaces/code-intel only for the repos the member actually has locally (bound + on disk)."
    rationale: >-
      member install configures a member's own clone; a member may only have some repos cloned.
      Surfaces + code-intel are materialized per repo whose bound local path exists on disk. The
      native MCP emission (today limited to sdd+spec) is extended to also cover the code repos the
      member has. adapter add, run from the control, covers all project.repos.
    decidedAtUtc: "2026-07-14T00:00:00Z"

