decisions:
  - id: DLT-001
    summary: >-
      Push channel implemented as Server-Sent Events (SSE), not a raw WebSocket. SSE is a plain
      text/event-stream HTTP response on the EXISTING `axiom app` http.Server — no new dependency,
      no 101-Upgrade handshake/framing — and is consumed by the browser `EventSource`. The
      transport shim opens the stream on `configure` and re-dispatches server pushes as `window`
      `message` events (the same contract the front already consumes); when `EventSource` is
      absent or the stream errors, the shim closes it and falls back to the existing request/
      response fetch path (the front re-requests the registry after each execute).
    rationale: >-
      "Either satisfies server push"; SSE is the dependency-light, minimal-handshake choice that
      rides the existing server primitive. A per-server LauncherEventHub broadcasts to subscribers
      of a project; a confirmed execute broadcasts `registryChanged`.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: DLT-002
    summary: >-
      `plan-new` and `plan-execute` move from preview-only to real execute, delegating to the P1
      run-functions (no lifecycle reimplementation). `plan-new` scaffolds a plan via
      `runPlanCreate` (axiom-plan create; metadata-only, not a state transition). `plan-execute`
      delegates to the plan's real transition `plan-approve` via the existing `executeSubcommand`
      (runPlanApprove). Both honor the preview/execute/confirmed contract — no mutation without
      confirmed:true. Axiom's plan workflow has a single real transition, so plan-execute and
      plan-close both resolve to plan-approve.
    rationale: >-
      Owner-approved kept long-tail; delegate to existing P1 helpers, respect the safety gate.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: DLT-003
    summary: >-
      Cost dashboard (copilot-usage) and deployment/trace panels are DISCARDED — out of Axiom
      scope by owner decision 2026-07-11. They are removed from every pending/deferred record
      (P3 README long-tail list, epic README/PLAN, 06_Integraciones) and are explicitly NOT
      tracked as deferred/pending. A future revisit is possible but untracked.
    rationale: >-
      Owner: "lo que descarto queda fuera y no queda como pendiente, sale de axiom".
    decidedAtUtc: "2026-07-12T00:00:00Z"

