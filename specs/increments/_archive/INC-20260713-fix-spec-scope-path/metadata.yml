openQuestions:
  - id: Q-001
    type: technical # functional | technical | compliance | ux | testing
    question: "Should the subfolder-spec-scope-in-multi-repo case (spec scope != spec repo root over MCP) also converge?"
    blocking: false
    status: deferred # open | resolved | deferred
    resolution: >-
      Deferred. The documented/dedicated case has spec scope == spec repo root
      (the KVP25 topology and the repo-affinity fixture). A subfolder spec scope
      resolved over MCP topology is a pre-existing, separate concern.

decisions:
  - id: D-001
    summary: "Derive the spec artifact rel-path from the resolved spec repo's role, not a hardcoded default."
    rationale: >-
      The `axiom.spec` subfolder is only correct for the self-hosted / co-located
      case (specs sharing a code repo). For a DEDICATED spec repo (axiom.yaml
      role === 'spec'), the spec scope IS the path passed and artifacts live
      directly under it. Making CLI lifecycle, the spec MCP broker, and migration
      all derive the same rel-path from the spec repo's role converges them onto
      one tree without changing single-repo / self-hosted behavior.
    decidedAtUtc: "2026-07-13T00:00:00Z"

