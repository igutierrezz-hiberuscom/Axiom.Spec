decisions:
  - id: D2-001
    summary: >-
      The tracker is selected by config (`tracker.kind: none|ado`) via a factory
      (`createWorkItemTracker`) — no core workflow path branches on tracker kind.
    rationale: >-
      Keeps the pure workflow engine tracker-agnostic (RECONCILIATION.md point 2):
      the tracker is an injected, optional plugin, not a code-path decision.
    decidedAtUtc: "2026-07-11T00:00:00Z"
  - id: D2-002
    summary: >-
      The ADO client is ported behind an injected HttpTransport port (default
      NodeHttpsTransport using raw https + _apis v7.1). @axiom/tracker-ado has NO
      vscode import (RISK-002); the 2 VSCode touches become SecretStore + promptForSecret.
    rationale: >-
      Faithful port of the lifecycle-critical WIT surface with zero editor dep and
      hermetic tests (fake transport, never dev.azure.com).
    decidedAtUtc: "2026-07-11T00:00:00Z"
  - id: D2-003
    summary: >-
      Peripheral ADO surface (Build defs/artifacts, Git commit/PR traceability,
      sprint/iteration catalog, attachments) is PARTIAL/deferred; the WIT-critical
      surface (auth, create/get/update/transition/link/child/WIQL, 4 mappings) is FULL.
    rationale: >-
      Scope realism for an XL phase: a correct, tested core over a broad-but-shaky port.
    decidedAtUtc: "2026-07-11T00:00:00Z"

