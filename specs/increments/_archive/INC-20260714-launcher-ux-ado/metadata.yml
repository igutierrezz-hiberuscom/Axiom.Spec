decisions:
  - id: D-001
    summary: "Extend the existing browser launcher + endpoints; do NOT rebuild or add a VSCode extension / framework / dependency."
    rationale: >-
      The sdd-launcher core port (epic INC-20260711-sdd-launcher-core-port) already re-homed the
      prompt engine, action catalog, HTTP endpoints, SSE push, the browser front, and the
      @axiom/tracker-ado engine. This increment is a UX redesign + surfacing the existing ADO write
      engine, framework-free and zero-VSCode-API (RISK-004 invariant preserved), served by axiom app.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-002
    summary: "ADO workflow endpoints delegate to @axiom/tracker-ado, preview/confirm-gated, config-gated on tracker.kind; tests use Null/Fake (no network)."
    rationale: >-
      create WI / state change / estimate / hours / branch+link already exist in @axiom/tracker-ado.
      New launcher endpoints delegate to them with the same no-mutation-without-confirmed contract as
      /launcher/execute, and gate on tracker.kind (friendly 'ADO no configurado' when none). Tests use
      NullTracker / the tracker-ado FakeHttpTransport — never dev.azure.com.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-003
    summary: "cost-dashboard + deployment/trace stay OUT (owner-discarded 2026-07-11); not re-added."
    rationale: >-
      The owner explicitly discarded the copilot-usage cost dashboard and deployment/trace panels as
      out of Axiom scope. This increment does not reintroduce them.
    decidedAtUtc: "2026-07-14T00:00:00Z"
  - id: D-004
    summary: "P0 (UX redesign) is must-ship; P1 (ADO write surface) ships as far as it stays green; remainder documented, gate never left red."
    rationale: >-
      The UX redesign satisfies the bulk of the request (beautiful, guided creation of increments/
      bugs/plans/implementations with pre-generated prompts + tool selection). The ADO write surface
      is delivered against the existing engine with Fake/Null tests; any operation that cannot land
      cleanly green is documented as a follow-up rather than faked or left breaking the gate.
    decidedAtUtc: "2026-07-14T00:00:00Z"

