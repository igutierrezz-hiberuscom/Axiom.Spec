openQuestions:
  - id: Q-001
    type: technical
    question: >-
      Which foreign spec formats are in-scope for the first detector pass?
      RESOLVED for this increment: axiom-native, openspec, docs-adr,
      generic-folders (matches the plan's proposed set).
    blocking: false
    status: resolved
    resolution: >-
      Shipped exactly those four detectors; the registry is injectable so it
      grows incrementally (D-001 of the parent plan).
  - id: Q-002
    type: technical
    question: >-
      Conversion depth: reshape into the full multi-doc canonical increment
      layout, or land a single sectioned README first?
    blocking: false
    status: resolved
    resolution: >-
      Single sectioned canonical README with a "Contenido original migrado"
      appendix. Multi-doc splitting (01_Requisitos/03_Criterios files) deferred
      — see parent plan Q-002.
  - id: Q-004
    type: compliance
    question: >-
      ID policy for idempotent re-runs (preserve foreign Axiom-style ID vs
      always mint fresh)?
    blocking: false
    status: open
    resolution: >-
      Out of scope here (Phase 4). Current behavior (always mint fresh via
      generateUniqueArtifactId, never overwrite) is retained unchanged.

decisions:
  - id: D-001
    summary: >-
      ScannedLegacyItem stays the stable seam; migrator.ts status semantics
      (resolveWorkflowStateForMigration / resolveDisplayStatusForMigration) are
      unchanged and remain the single source of truth for the final status.
    rationale: >-
      Detection and conversion are additive; the safe status resolver must not
      be weakened. axiom-native detector reproduces today's scan verbatim.
    decidedAtUtc: "2026-07-12"
  - id: D-002
    summary: >-
      Structural conversion is graceful-downgrade: unstructured bodies fall
      back to today's verbatim-with-AXIOM:MIGRATED-banner output, byte-identical
      to the pre-increment behavior. No information is ever lost or invented.
    rationale: >-
      Guarantees zero regression for the existing from-legacy-sdd test suite and
      honors the plan's "conversion is additive quality, never a data-loss risk".
    decidedAtUtc: "2026-07-12"

