openQuestions: []

decisions:
  - id: DP-001
    summary: >-
      The peripheral surface is exposed as OPTIONAL segregated sub-interfaces on
      IWorkItemTracker (build?/git?/sprints?/attachments?), not extra required
      methods, so the extension is fully back-compatible with every existing impl
      and test double.
    rationale: >-
      Additive + optional keeps back-compat guaranteed; segregation keeps ADO's
      broad peripheral API cohesive and lets NullTracker no-op each capability.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: DP-002
    summary: >-
      A `requestBinary` (Buffer body, application/octet-stream) is added to the
      ADO request layer for the attachment upload path, reusing resolvePat and the
      injected HttpTransport; peripheral impls live in separate modules
      (ado-build/ado-git/ado-sprints/ado-attachments) to keep the diff acotado.
    rationale: >-
      Faithful port of uploadInlineAttachments' binary path with zero new network
      seam and hermetic tests (fake transport, never dev.azure.com).
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: DP-003
    summary: >-
      Inline repro-image HTML (buildReproStepsHtml with <img>) stays OUT; only the
      reusable binary upload+attach path is shipped.
    rationale: >-
      The HTML render belongs with the P3/P4 front-end consumer; the binary path
      is the lifecycle-relevant primitive.
    decidedAtUtc: "2026-07-12T00:00:00Z"

