decisions:
  - id: D-001
    summary: "Item 5 (path canonicalization) applied at compare-time only, not write-time."
    rationale: >-
      Canonicalizing stored registry paths at write time via fs.realpathSync.native
      rewrites Windows 8.3 short names (e.g. IGUTIE~1) to their long form
      (igutierrezz), which would break unflagged exact-path assertions
      (implementation-context-handler.test.ts, workspace-incremental.test.ts).
      Canonicalizing both operands at every comparison site (registry find
      functions, resolver ancestor compare, relativeRef) fully fixes the
      cross-form matching bug without mutating stored values or requiring
      test-assertion changes.
    decidedAtUtc: "2026-07-11T11:13:40Z"

