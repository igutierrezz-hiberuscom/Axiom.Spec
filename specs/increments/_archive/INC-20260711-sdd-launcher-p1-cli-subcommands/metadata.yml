openQuestions:
  - id: Q-001
    type: technical # functional | technical | compliance | ux | testing
    question: "Is there an `e2e` artifact kind to scaffold, or is qa-e2e a runtime lane only?"
    blocking: false
    status: resolved # open | resolved | deferred
    resolution: "qa-e2e is a runtime WORKFLOW lane (materialized by `axiom-qa-e2e start`), NOT a folder-per-instance ArtifactKind (ArtifactKind = increment|bug|plan|adr|decision). `axiom scaffold e2e` is therefore DEFERRED: it prints a clear pointer to `axiom-qa-e2e start` rather than fabricating an artifact tree that has no template."

decisions:
  - id: D-001
    summary: "`axiom scaffold <kind>` delegates to the existing create run functions; no generator logic is duplicated."
    rationale: "`axiom-increment create` / `axiom-bug create` / `axiom-plan create` already call scaffoldArtifact() (P0). scaffold multiplexes over runIncrementSubcommand/runBugSubcommand/runPlanCreate so `create` and `scaffold` share ONE generator path. `create` becomes the per-workflow alias of the canonical `scaffold` entry."
    decidedAtUtc: "2026-07-11T00:00:00Z"
  - id: D-002
    summary: "normalize maps emoji-ES literals to Axiom WorkflowState via lifecycle-vocabulary; it never persists the emoji-ES vocab."
    rationale: "P0.4 lifecycle-vocabulary.ts is the single interop table. normalize canonicalizes `status` to one of the 9 WorkflowStates (Integrado -> status=archived + integration.status=integrated, per the axis-split note). Already-canonical statuses are untouched, so a second run is a no-op (idempotent)."
    decidedAtUtc: "2026-07-11T00:00:00Z"
  - id: D-003
    summary: "integrate REUSES archiveArtifactDir + the increment/bug archive transition; it does not reimplement the move."
    rationale: "KVP25's integrate-spec-item.mjs does its own fs.rename + YAML surgery. Axiom already has archiveArtifactDir (atomic, no-clobber) and a declared archive transition. integrate applies the terminal transition (verifying->archived) via applyTransition, sets integration.status=integrated on metadata.yml, then archives the folder."
    decidedAtUtc: "2026-07-11T00:00:00Z"
  - id: D-004
    summary: "An optional `integration` axis is added to the artifact-store metadata (additive, like `roles`)."
    rationale: "P0.4 declared integration.status as a SEPARATE axis from WorkflowState. The artifact-store metadata had no field for it. Added `integration?: { status; integratedAt? }` to BaseArtifactMetadata; omitted when unset (back-compat with every existing metadata.yml and toEqual round-trip test)."
    decidedAtUtc: "2026-07-11T00:00:00Z"

