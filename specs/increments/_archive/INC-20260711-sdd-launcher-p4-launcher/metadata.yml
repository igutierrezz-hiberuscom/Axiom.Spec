openQuestions: []

decisions:
  - id: D4-001
    summary: >-
      buildPrompt stays adapter-neutral. The ONLY adapter-specific inputs are the
      header/mention line (first line of the prompt) and the launch verb/mechanism;
      the structured body, context lines and notes are identical across adapters.
    rationale: >-
      Satisfies the P4 acceptance directly (same action -> 2 adapters differ only in
      header + launch verb) and keeps the ported KVP25 promptBuilder pure/deterministic.
    decidedAtUtc: "2026-07-11T00:00:00Z"
  - id: D4-002
    summary: >-
      agentRouting.actions (a flat action-id -> mention map with a single
      defaultAgentMention) is generalized into a per-adapter table
      { id, promptDialect, routingMap, launchMechanism, defaultAgentMention }.
      Two fallback levels preserve agentRoutingService behavior: (a) selecting an
      adapter id absent from the table falls back to the table-level
      defaultAgentMention; (b) an action absent from an adapter's routingMap falls
      back to that adapter's defaultAgentMention.
    rationale: >-
      Faithful behavioral superset of agentRoutingService.resolveAgentMention's
      key -> intentId -> defaultAgentMention chain, extended over the adapter axis.
    decidedAtUtc: "2026-07-11T00:00:00Z"
  - id: D4-003
    summary: >-
      routingMap targets resolve to REAL ids on the selected surface: CLI targets carry
      the canonical @axiom/workflow transition command (DEFAULT_WORKFLOWS) plus the real
      `axiom <cmd> <sub>` invocation; Claude Code / Copilot targets resolve to a
      catalogued @axiom/skills skill id (axiom-sdd-orchestrator); MCP action tools resolve
      to @axiom/mcp-tools MCP_TOOL_CAPABILITY_IDS values (sdd.transitionApply for mutation,
      spec.*Read for reads). A test cross-checks every declared workflowCommand against
      DEFAULT_WORKFLOWS and every mcp id against MCP_TOOL_CAPABILITY_IDS so no target is invented.
    rationale: >-
      Directly satisfies "wire to real commands/skills" with a verifiable, non-inventing
      guarantee; keeps the dependency direction sane (launcher depends on
      workflow/skills/mcp-tools, never the reverse).
    decidedAtUtc: "2026-07-11T00:00:00Z"
  - id: D4-004
    summary: >-
      Family/mode reconciliation to Axiom's 5 workflows is monotonic and documented
      (README "Routing model"): family `incremento` -> workflow `increment`, `bug` -> `bug`,
      `plan` -> `plan`, `back`/`front` -> the single `role` workflow (repo-role
      distinguishes them), `e2e` -> `qa-e2e`; modes new/execute/close/archive map to the
      workflow's start/advance/finalize/archive transitions. The ported KVP25 catalog
      literals are preserved as-is (no source rename); reconciliation lives in a
      FAMILY_TO_WORKFLOW map + a reconciliation table, not by mutating the port.
    rationale: >-
      Preserves port fidelity while wiring to Axiom's real lifecycle. Plan new/execute
      have no single workflow transition (plan authoring is a CLI scaffold, not a state
      transition), so those carry a CLI target with no workflowCommand.
    decidedAtUtc: "2026-07-11T00:00:00Z"

