decisions:
  - id: D-FV-001
    summary: >-
      Functional verify is an EXPLICIT gate function (mirroring
      `checkPlanIsApproved` / `runRoleReview`), NOT a confirm-gated `run-validation`
      NamedAction side-effect.
    rationale: >-
      The git `script/action` side-effect model is OPT-IN + confirm-gated (preview
      unless confirmed) — the right shape for a mutation. Functional verify is the
      opposite: a read-only gate that must run BY DEFAULT (when a command is
      discovered) and BLOCK the transition on failure. An explicit gate function
      that returns a structured outcome the caller uses to set the exit code and
      skip persistence is the exact seam the per-role write-scope review already
      uses, so it composes cleanly at `axiom-role complete`.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: D-FV-002
    summary: >-
      The command runner is an injectable `ValidationRunner`
      ((command, args, cwd) => { ok, code, stdout, stderr }); default impl uses
      `spawnSync` (shell:true on win32 so `npm` resolves to `npm.cmd`).
    rationale: >-
      Mirrors the repo's own `GitRunner`/`GitDiffRunner` precedent (spawnSync +
      dependency injection). Unit tests inject a FAKE runner that records the
      requested command and returns a scripted result, so no real sub-build ever
      runs in the suite; the real seam is proven only against a lightweight
      `node <script>` in a throwaway temp dir.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: D-FV-003
    summary: >-
      Detection-gated: the functional run engages ONLY when a validation command is
      discovered. No command found → emit AGENTS.md's exact statement and treat as
      a non-blocking pass-with-note.
    rationale: >-
      The 2560-test suite must stay green. Existing lifecycle tests run in fixture
      temp repos with no package.json / README / Makefile, so discovery finds
      nothing → no-command → non-blocking, and no sub-process is ever spawned. This
      makes the gate additive: it only bites when there is a real command to run.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: D-FV-004
    summary: >-
      `axiom-increment verify` resolves the repos to validate from the ACTIVE
      approved plan's `targetRepos` (topology + LocalBindings). No active plan / no
      targetRepos / topology unresolved → skip (non-blocking). Unresolvable target
      repos are REPORTED (never silently skipped) but do NOT block; only a resolved
      repo whose validation actually FAILS blocks.
    rationale: >-
      Reuses the exact cross-repo resolution primitives (`resolveRepoPath` +
      `loadLocalBindings`) as `validate changes --all-repos` and
      `_cross-repo-plan.ts`. Not blocking on an unresolvable repo (e.g. a target
      repo not checked out locally in a partial multi-repo clone) avoids a
      foot-gun; reporting it satisfies the "never silently skip" requirement. Skip
      on no-plan keeps single-repo / dogfooding lifecycle tests green.
    decidedAtUtc: "2026-07-12T00:00:00Z"
  - id: D-FV-005
    summary: >-
      Bypass + preview are supported. `--no-verify` (and `--force`) skip the
      functional run; `--preview`/`--dry-run` on `axiom-increment verify` reports
      the discovered validation without running it and without transitioning.
      `axiom-qa-e2e verify --run-validation` is the QA lane's explicit real-run
      opt-in (inline-noop stays the default).
    rationale: >-
      A gate needs an escape hatch (the same reason `--no-review`/`--force` exists
      for the write-scope review). `--force` at `axiom-role complete` bypasses BOTH
      the write-scope review and functional verify. Preview lets an operator see
      what would run before committing to a potentially heavy build.
    decidedAtUtc: "2026-07-12T00:00:00Z"

